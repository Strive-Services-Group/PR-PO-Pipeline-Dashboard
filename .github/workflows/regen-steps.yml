# Regenerates pr_steps.json in the cloud whenever pr.xlsx is updated on GitHub
# (e.g. pushed directly by the Power Automate email flow). This means the
# dashboard's step data stays correct even when CK's laptop is off.
name: Regenerate pr_steps.json
on:
  push:
    branches: [main]
    paths: [pr.xlsx]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install openpyxl
      - run: python gen_pr_steps.py pr.xlsx
      - name: Commit pr_steps.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr_steps.json
          git diff --cached --quiet || { git commit -m "Auto-regenerate pr_steps.json"; git push; }
