# Cloud auto-update: pulls Abdul's latest PR/PO files from OneDrive (via Microsoft
# Graph) and refreshes the dashboard - runs in GitHub's cloud, so it works even when
# CK's laptop is off. The Power Automate flow just needs to keep saving the email
# attachments into the OneDrive "Email-Drops" folder.
name: Fetch PR/PO from OneDrive
on:
  schedule:
    - cron: "*/5 5-8 * * *"     # every 5 min, 09:00-12:55 Dubai time (UTC+4)
  workflow_dispatch:             # lets you run it on demand from the Actions tab

permissions:
  contents: write
  actions: write        # needed to disable this workflow once today's file is in

concurrency:
  group: fetch-onedrive
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests openpyxl
      - name: Pull latest exports from OneDrive
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          ONEDRIVE_USER: ${{ secrets.ONEDRIVE_USER }}
          ONEDRIVE_FOLDER: ${{ secrets.ONEDRIVE_FOLDER }}
        run: python fetch_from_onedrive.py
      - name: Commit and push any changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr.xlsx po.xlsx pr_steps.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new data - keep polling."
          else
            git commit -m "Cloud data refresh from OneDrive"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New data processed."
          fi
      - name: Stop polling for the rest of today
        # Once we've actually picked up and published a new file, disable this
        # workflow so it stops running. The companion "arm-onedrive-fetch" workflow
        # re-enables it early tomorrow morning. Best-effort: never fail the run.
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/fetch-from-onedrive.yml/disable" \
            && echo "Fetch workflow disabled until tomorrow's re-arm." || echo "Could not disable (will just keep polling harmlessly)."
